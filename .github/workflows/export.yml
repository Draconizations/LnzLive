on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 * * *'

jobs:
  export_game:
    name: Export
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: checkout
      uses: actions/checkout@v7

    - name: install wine
      id: wine_install
      run: |
        sudo dpkg --add-architecture i386
        sudo apt update
        sudo apt install -y wine64 wine32
        echo "WINE_PATH=$(which wine)" >> $GITHUB_OUTPUT

    - name: export game
      id: export
      # Use latest version (see releases for all versions)
      uses: firebelley/godot-export@v8.0.0
      with:
        # Defining all the required inputs
        godot_executable_download_url: https://github.com/Draconizations/godot-petz/releases/download/v0.1.0/godot_server.x11.opt.tools.64
        godot_export_templates_download_url: https://github.com/Draconizations/godot-petz/releases/download/v0.1.0/export_templates.tpz
        relative_project_path: ./
        archive_output: true
        wine_path: ${{ steps.wine_install.outputs.WINE_PATH }} # set the wine path here which is the output of the wine_install step
      
      